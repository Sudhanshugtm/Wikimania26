<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="theme-color" content="#202122">
	<title>Try the prototype · Wikimania 2026</title>
	<style>
		:root {
			color-scheme: light;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
			color: #202122;
			background: #f8f5ef;
		}

		* { box-sizing: border-box; }

		body {
			min-width: 320px;
			min-height: 100vh;
			min-height: 100svh;
			margin: 0;
			background:
				radial-gradient(circle at 15% 10%, rgb(255 255 255 / 90%) 0 9rem, transparent 24rem),
				#f8f5ef;
		}

		main {
			display: grid;
			place-items: center;
			min-height: 100vh;
			min-height: 100svh;
			padding: 20px;
		}

		.note {
			width: 100%;
			max-width: 640px;
			padding: clamp(28px, 7vw, 56px);
			border: 1px solid #c8ccd1;
			border-top: 6px solid #36c;
			border-radius: 16px;
			background: #fff;
			box-shadow: 0 18px 60px rgb(32 33 34 / 10%);
		}

		.eyebrow {
			margin: 0 0 16px;
			color: #36c;
			font-size: 0.8125rem;
			font-weight: 700;
			letter-spacing: 0.08em;
			text-transform: uppercase;
		}

		h1 {
			max-width: 14ch;
			margin: 0;
			font-family: Georgia, "Times New Roman", serif;
			font-size: clamp(2rem, 8vw, 3.5rem);
			font-weight: 500;
			letter-spacing: -0.035em;
			line-height: 1.03;
		}

		.intro {
			max-width: 48ch;
			margin: 24px 0 0;
			font-size: clamp(1rem, 2.4vw, 1.125rem);
			line-height: 1.6;
		}

		.instructions {
			margin: 24px 0;
			padding: 20px;
			border-radius: 10px;
			background: #f8f9fa;
			line-height: 1.55;
		}

		.instructions strong {
			display: block;
			margin-bottom: 4px;
		}

		.cta {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			min-height: 48px;
			width: 100%;
			padding: 12px 20px;
			border-radius: 8px;
			background: #72777d;
			color: #fff;
			font-weight: 700;
			text-align: center;
			cursor: not-allowed;
		}

		.status {
			margin: 12px 0 0;
			color: #54595d;
			font-size: 0.875rem;
			line-height: 1.45;
			text-align: center;
		}

		@media (min-width: 600px) {
			main { padding: 40px; }
			.cta { width: auto; }
			.status { text-align: left; }
		}

		@media (prefers-reduced-motion: reduce) {
			* { scroll-behavior: auto !important; }
		}
	</style>
</head>
<body>
	<main>
		<article class="note" aria-labelledby="page-title">
			<p class="eyebrow">Wikimania 2026</p>
			<h1 id="page-title">Try the prototype</h1>
			<p class="intro">We’re testing a new idea and would like your feedback.</p>
			<div class="instructions">
				<strong>What to do</strong>
				Open the prototype on Test Wikipedia and give it a try. When you’re done, tell us what worked and what could be better.
			</div>
			<!-- Replace this span with an anchor to the Test Wikipedia prototype when its URL is ready. -->
			<span class="cta" aria-disabled="true">Prototype coming soon</span>
			<p class="status">We’ll add the prototype link here before the session.</p>
		</article>
	</main>
</body>
</html>
